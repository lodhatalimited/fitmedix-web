name: Claude Auto-Implement

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  implement:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'claude') ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/claude') && github.event.issue.pull_request == null)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set issue number and instruction
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "issue_title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
            INSTRUCTION="${{ github.event.comment.body }}"
            INSTRUCTION="${INSTRUCTION#/claude}"
            echo "instruction=$INSTRUCTION" >> $GITHUB_OUTPUT
            echo "mode=comment" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "issue_title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
            echo "instruction=${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
            echo "mode=label" >> $GITHUB_OUTPUT
          fi

      - name: Check if branch already exists
        id: check
        run: |
          BRANCH="claude/issue-${{ steps.ctx.outputs.issue_number }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          if git ls-remote --exit-code origin "$BRANCH"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "claude-bot"
          git config user.email "claude@fitmedix.com"

      - name: Checkout or create branch
        run: |
          BRANCH="${{ steps.check.outputs.branch }}"
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            git checkout -b "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      - name: Run Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p "
          You are working on the Fitmedix website (Next.js 14 + Tailwind CSS).
          The site is at fitmedix-web.vercel.app.

          GitHub Issue #${{ steps.ctx.outputs.issue_number }}: ${{ steps.ctx.outputs.issue_title }}

          Task: ${{ steps.ctx.outputs.instruction }}

          Implement the requested changes. Follow existing code patterns.
          Make minimal targeted changes. Do not add features beyond what is requested.
          After making changes run: git add -A && git commit -m 'feat: ${{ steps.ctx.outputs.issue_title }} (#${{ steps.ctx.outputs.issue_number }})'
          "

      - name: Push branch
        run: git push origin "${{ steps.check.outputs.branch }}"

      - name: Open or update Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin "${{ steps.check.outputs.branch }}"
          gh pr create \
            --title "feat: ${{ steps.ctx.outputs.issue_title }}" \
            --body "Closes #${{ steps.ctx.outputs.issue_number }}

          Auto-implemented by Claude.

          **Review checklist:**
          - [ ] Check the Vercel preview URL
          - [ ] Verify the change looks correct
          - [ ] Approve and merge to deploy live" \
            --base master \
            --head "${{ steps.check.outputs.branch }}" \
          || echo "PR already exists — branch updated"
